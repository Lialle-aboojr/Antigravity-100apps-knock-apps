<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual Quote Generator | 名言・格言ジェネレーター</title>
    <!-- アプリのスタイルシートを読み込みます -->
    <link rel="stylesheet" href="style.css">
    <!-- ファビコンの指定。画像がない場合はJavaScriptで絵文字SVGにフォールバックします -->
    <link rel="icon" href="favicon.png" id="dynamic-favicon">
    <!-- Google Fontsから美しいフォントを読み込みます -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1 class="title-en">Bilingual Quote Generator</h1>
            <p class="title-ja">名言・格言ジェネレーター</p>
        </header>
        
        <!-- 名言を表示するカード部分 -->
        <div class="quote-card" id="quote-card">
            <!-- 引用符のアイコン装飾 -->
            <div class="quote-mark">"</div>
            
            <div class="quote-content">
                <!-- 英語の名言 -->
                <p class="quote-en" id="quote-en">Loading...</p>
                <!-- 日本語の名言 -->
                <p class="quote-ja" id="quote-ja">読み込み中...</p>
            </div>
            
            <div class="quote-author">
                <div class="author-line"></div>
                <!-- 発言者（英語） -->
                <span class="author-en" id="author-en"></span>
                <!-- 発言者（日本語） -->
                <span class="author-ja" id="author-ja"></span>
            </div>
        </div>
        
        <div class="controls">
            <!-- 新しい名言を取得するボタン -->
            <button id="next-btn" class="btn" aria-label="Next Quote">
                <span class="btn-text-ja">別の言葉を見る</span>
                <span class="btn-text-en">Next Quote</span>
            </button>
        </div>
    </main>

    <!-- アプリのコアロジックを読み込みます -->
    <script src="script.js"></script>
</body>
</html>
