<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Cost Calculator (お食事原価計算ツール)</title>
  
  <!-- 生成したファビコン画像を読み込む（優先） -->
  <link rel="icon" href="favicon.png">
  
  <!-- 【フォールバック用】画像生成が失敗した場合や画像が読み込めない場合は、以下の行のコメントアウトを外して絵文字ファビコンを使用してください -->
  <!-- <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪙</text></svg>"> -->
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>🍽️ Recipe Cost Calculator<br><span>お食事原価計算ツール</span></h1>
      <p>自炊のコスパをしっかり管理しましょう / Manage your meal costs effectively</p>
    </header>

    <main>
      <!-- 基本情報セクション / Basic Info -->
      <section class="card section-basic">
        <h2>📝 基本情報 / Basic Info</h2>
        <div class="input-group">
          <label for="recipe-name">料理名 / Recipe Name</label>
          <input type="text" id="recipe-name" placeholder="例: カレーライス / e.g. Curry Rice">
        </div>
        <div class="input-group">
          <label for="servings">何人前作るか / Servings</label>
          <!-- 小数点入力を防ぐため step="1" を指定し、JavaScript側でも整数判定を行います -->
          <input type="number" id="servings" value="1" min="1" step="1">
        </div>
      </section>

      <!-- 新規材料の入力フォーム（固定） -->
      <section class="card section-add-ingredient">
        <h2>➕ 新しい材料を追加 / Add New Ingredient</h2>
        <div class="ingredient-row fixed-form">
          <div class="ingredient-grid top-row">
            <div class="input-group">
              <label for="new-name">材料名 / Ingredient Name</label>
              <input type="text" id="new-name" placeholder="例: じゃがいも / Potato">
            </div>
          </div>
          
          <div class="ingredient-grid bottom-row">
            <div class="input-group">
              <label for="new-price">購入価格 / Price (¥)</label>
              <!-- プレースホルダーに(数字のみ)等の注釈を追加して単位入力を防ぐ -->
              <input type="number" id="new-price" min="0" placeholder="例: 200 (数字のみ)">
            </div>
            <div class="input-group">
              <label for="new-totalQty">購入量 / Total Qty</label>
              <input type="number" id="new-totalQty" min="0" step="0.1" placeholder="例: 500 (単位不要)">
            </div>
            <div class="input-group">
              <label for="new-usedQty">使った量 / Used Qty</label>
              <input type="number" id="new-usedQty" min="0" step="0.1" placeholder="例: 100 (単位不要)">
            </div>
            
            <div class="add-container">
              <button id="add-btn" class="btn btn-primary">
                ＋ 追加 / Add
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- 材料リストセクション / Ingredients -->
      <section class="card section-ingredients">
        <h2>🛒 追加済みの材料 / Added Ingredients</h2>
        <div id="ingredients-container" class="ingredients-list">
          <!-- JSでここに要素が動的に追加されます -->
        </div>
      </section>
    </main>

    <!-- 結果セクション / Results -->
    <footer class="results-footer">
      <div class="results-container">
        <div class="result-box">
          <span class="result-label">料理全体の原価 / Total Cost</span>
          <span class="result-value" id="total-cost">¥0</span>
        </div>
        <div class="result-divider"></div>
        <div class="result-box highlighted">
          <span class="result-label">1人前あたりの原価 / Cost per Serving</span>
          <span class="result-value" id="cost-per-serving">¥0</span>
        </div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
