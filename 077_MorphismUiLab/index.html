<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphism UI Lab</title>
  <link rel="icon" href="favicon.png">
  <!-- Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="layout">
    <!-- Left column: Control Panel -->
    <aside class="control-panel">
      <header class="app-header">
        <h1>Morphism UI Lab</h1>
        <p>GENERATE & TEST MODERN UI STYLES</p>
      </header>

      <!-- 1. Style Selection (Segment Control) -->
      <section class="control-section">
        <h2 class="section-title">STYLE</h2>
        <div class="segment-control" id="style-tabs">
          <button class="segment-btn active" data-style="neumorphism">Neumorphism</button>
          <button class="segment-btn" data-style="glassmorphism">Glassmorphism</button>
          <button class="segment-btn" data-style="claymorphism">Claymorphism</button>
        </div>
      </section>

      <!-- 2. Parameters -->
      <section class="control-section">
        <h2 class="section-title">PARAMETERS</h2>
        <div class="param-group">
          <label for="base-color">
            Base Color
            <span id="base-color-val" class="param-val">#e0e5ec</span>
          </label>
          <div class="color-picker-wrapper">
             <input type="color" id="base-color" value="#e0e5ec">
          </div>
        </div>
        <div class="param-group">
          <label for="shadow-dist">
            Shadow Distance
            <span id="shadow-dist-val" class="param-val">8px</span>
          </label>
          <input type="range" id="shadow-dist" min="0" max="50" value="8">
        </div>
        <div class="param-group" id="intensity-group">
          <label for="shadow-intensity">
            Shadow Intensity
            <span id="shadow-intensity-val" class="param-val">15%</span>
          </label>
          <input type="range" id="shadow-intensity" min="0" max="100" value="15">
        </div>
        <div class="param-group" id="blur-group" style="display: none;">
          <label for="blur">
            Blur
            <span id="blur-val" class="param-val">10px</span>
          </label>
          <input type="range" id="blur" min="0" max="50" value="10">
        </div>
        <div class="param-group" id="opacity-group" style="display: none;">
          <label for="opacity">
            Opacity
            <span id="opacity-val" class="param-val">40%</span>
          </label>
          <input type="range" id="opacity" min="0" max="100" value="40">
        </div>
        <div class="param-group">
          <label for="border-radius">
            Border Radius
            <span id="border-radius-val" class="param-val">20px</span>
          </label>
          <input type="range" id="border-radius" min="0" max="50" value="20">
        </div>
      </section>

      <!-- 3. CSS Copy -->
      <section class="control-section copy-section">
        <button id="copy-btn" class="primary-btn">
          <span class="material-icons-round">content_copy</span>
          COPY CSS
        </button>
      </section>

      <footer class="app-footer">
        <p>Inputs are securely sanitized.</p>
      </footer>
    </aside>

    <!-- Right column: Preview Area -->
    <main class="preview-area" id="preview-area" data-theme="neumorphism">
      <div class="glass-bg-blobs" id="blobs" style="display:none;">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
      </div>
      
      <div class="preview-content">
        
        <!-- CARD 1: SEARCH & INPUTS -->
        <div class="ui-catalog-section morphism-element card">
          <h3 class="section-label">SEARCH</h3>
          <div class="input-wrapper morphism-element">
            <span class="material-icons-round input-icon">search</span>
            <input type="text" id="preview-input" class="inner-input" placeholder="Search..." oninput="sanitizeInput(this)">
          </div>
        </div>

        <!-- CARD 2: MEDIA PLAYER & ICON BUTTONS -->
        <div class="ui-catalog-section morphism-element card">
          <h3 class="section-label">MEDIA PLAYER & ICON BUTTONS</h3>
          <div class="ui-row justify-center">
            <!-- Icon Buttons -->
            <button class="morphism-element btn icon-btn" aria-label="Previous">
              <span class="material-icons-round">skip_previous</span>
            </button>
            <button class="morphism-element btn icon-btn play-btn" aria-label="Play">
              <span class="material-icons-round">play_arrow</span>
            </button>
            <button class="morphism-element btn icon-btn" aria-label="Next">
              <span class="material-icons-round">skip_next</span>
            </button>
          </div>
          <div class="ui-row justify-center mt-2">
             <button class="morphism-element btn icon-btn small-icon-btn" aria-label="Add">
              <span class="material-icons-round">add</span>
            </button>
            <button class="morphism-element btn icon-btn small-icon-btn" aria-label="Remove">
              <span class="material-icons-round">remove</span>
            </button>
          </div>
        </div>

        <!-- CARD 3: TOGGLE & CHIPS -->
        <div class="ui-catalog-section morphism-element card">
          <div class="ui-row space-between align-center">
            <div class="toggle-group">
               <h3 class="section-label mb-0">TOGGLE</h3>
               <div class="ui-row align-center mt-1">
                 <span class="sub-label">OFF</span>
                 <div class="morphism-element toggle" id="preview-toggle" role="switch" aria-checked="false" tabindex="0">
                   <div class="toggle-knob morphism-element"></div>
                 </div>
                 <span class="sub-label">ON</span>
               </div>
            </div>
            
            <div class="dropdown-group">
               <h3 class="section-label mb-0">DROPDOWN</h3>
               <div class="morphism-element select-wrapper mt-1">
                 <select class="inner-select">
                   <option value="1">Option 1</option>
                   <option value="2">Option 2</option>
                   <option value="3">Option 3</option>
                 </select>
                 <span class="material-icons-round select-icon">expand_more</span>
               </div>
            </div>
          </div>
        </div>

        <!-- CARD 4: SLIDER / PROGRESS -->
        <div class="ui-catalog-section morphism-element card">
          <h3 class="section-label">SLIDER</h3>
          <div class="morphism-element progress-track mt-1">
            <div class="progress-fill" style="width: 65%;"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <span class="material-icons-round">check_circle</span>
    Copied to clipboard!
  </div>

  <script src="script.js"></script>
</body>
</html>
