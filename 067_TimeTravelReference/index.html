<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイムトラベル早見表 / Time Travel Quick Reference</title>
    
    <!-- ファビコンの設定 -->
    <link rel="icon" href="favicon.png" type="image/png">
    <!-- 画像が読み込めなかった場合のフォールバック（絵文字SVG） -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏳</text></svg>" id="fallback-favicon">

    <!-- Google Fonts: レトロポップな丸ゴシック -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols (アウトライン) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- ヘッダー -->
        <header class="card title-card">
            <h1>タイムトラベル早見表</h1>
            <p class="en-title">Time Travel Quick Reference</p>
        </header>

        <main>
            <!-- 上部: コントロールパネル -->
            <section class="controls-panel">
                
                <!-- マイタイムライン -->
                <div class="card timeline-card">
                    <div class="card-header">
                        <h2>マイ・タイムライン / My Timeline</h2>
                        <span class="material-symbols-rounded icon-accent">calendar_month</span>
                    </div>
                    
                    <div class="input-group">
                        <div class="input-row">
                            <!-- 生まれ年 -->
                            <div class="input-col">
                                <label for="birth-year">生まれ年（西暦）<br><span class="en-label">Birth Year</span></label>
                                <input type="number" id="birth-year" placeholder="例: 1990" min="1900" max="2100">
                            </div>
                            
                            <!-- 中央の連動アイコン -->
                            <div class="sync-icon">
                                <span class="material-symbols-rounded">sync_alt</span>
                            </div>

                            <!-- 現在の年齢 -->
                            <div class="input-col">
                                <label for="current-age">現在の年齢<br><span class="en-label">Current Age</span></label>
                                <input type="number" id="current-age" placeholder="例: 36" min="0" max="150">
                            </div>
                        </div>
                        <div class="action-row">
                            <button id="apply-btn" class="btn primary-btn">スケジュールを反映 / Apply</button>
                        </div>
                    </div>
                    
                    <!-- アバター＆干支 表示領域 -->
                    <div id="avatar-container" class="avatar-area hidden">
                        <img id="user-avatar" src="" alt="User Avatar">
                        <p id="avatar-desc" class="avatar-message"></p>
                        <!-- 干支の表示場所 -->
                        <p id="zodiac-info" class="zodiac-text"></p>
                    </div>
                </div>

                <!-- 時代フィルタ -->
                <div class="card filter-card">
                    <div class="card-header">
                        <h2>時代フィルタ / Era Filters</h2>
                        <span class="material-symbols-rounded icon-accent">filter_alt</span>
                    </div>
                    <div class="filter-group">
                        <button class="filter-btn active" data-era="all">すべて / All</button>
                        <button class="filter-btn" data-era="showa">昭和 / Showa</button>
                        <button class="filter-btn" data-era="heisei">平成 / Heisei</button>
                        <button class="filter-btn" data-era="reiwa">令和 / Reiwa</button>
                    </div>
                </div>
            </section>

            <!-- 下部: テーブル表示 -->
            <section class="table-section card">
                <table id="reference-table">
                    <thead>
                        <tr>
                            <th>西暦 <br><span class="en-label">Year</span></th>
                            <th>和暦 <br><span class="en-label">Era</span></th>
                            <th>年齢 <br><span class="en-label">Age</span></th>
                            <th>ライフイベント <br><span class="en-label">Life Events</span></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- JSでデータが挿入されます -->
                    </tbody>
                </table>
            </section>
        </main>

        <footer>
            <p>© 2026 Time Travel Quick Reference App</p>
        </footer>
    </div>

    <script src="script.js"></script>
    
    <script>
        // カスタムファビコンのエラーハンドリング
        window.onload = function() {
            var mainFavicon = document.querySelector('link[rel="icon"][href="favicon.png"]');
            var img = new Image();
            img.onerror = function() {
                if(mainFavicon) {
                    mainFavicon.parentNode.removeChild(mainFavicon);
                }
            };
            img.src = 'favicon.png';
        };
    </script>
</body>
</html>
