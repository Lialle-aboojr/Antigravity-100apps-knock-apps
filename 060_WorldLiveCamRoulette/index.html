<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="世界中のライブ映像をランダム表示 - World Live Cam Roulette">
    <title>World Live Cam Roulette</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-window">
    <div class="app-container">
        
        <header class="app-header">
            <div class="logo-area">
                <h1>
                    <span>World Live Cam Roulette</span>
                    <span class="ja-subtitle">世界ランダムカメラ</span>
                </h1>
            </div>
            
            <div class="controls-area">
                <div class="theme-selector-group">
                    <label for="themeSelect">
                        <span class="en">Theme:</span>
                        <span class="ja">テーマ:</span>
                    </label>
                    <select id="themeSelect">
                        <option value="theme-window">部屋の窓 / Window</option>
                        <option value="theme-tv">レトロテレビ / Retro TV</option>
                        <option value="theme-airplane">飛行機の窓 / Airplane</option>
                        <option value="theme-simple">シンプル / Simple</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="player-section" id="playerSection">
            <div class="frame-container" id="frameContainer">
                
                <!-- TV用コントロールパネル (テーマ2でのみ表示) -->
                <div class="tv-control-panel">
                    <div class="dials">
                        <div class="tv-dial main-dial"></div>
                        <div class="tv-dial sub-dial"></div>
                    </div>
                    <div class="tv-speaker"></div>
                </div>

                <!-- 映像やオーバーレイが入るスクリーンエリア -->
                <div class="screen-area">
                    <div class="yt-container" id="ytContainer">
                        <div id="youtube-player"></div>
                    </div>
                    
                    <!-- 画面の上に被さるテーマ特有の装飾・枠 -->
                    <div class="theme-overlay"></div>
                    
                    <!-- トランジション（切り替え）用レイヤー -->
                    <div class="transition-layer">
                        <!-- 1. Window: カーテン -->
                        <div class="curtain-wrapper">
                            <div class="curtain-panel left-panel"></div>
                            <div class="curtain-panel right-panel"></div>
                        </div>
                        
                        <!-- 2. TV: CRTアニメーションのためのフラッシュ -->
                        <div class="trans-piece crt-flash"></div>
                        
                        <!-- 3. Airplane: 雲 -->
                        <div class="trans-piece clouds-wrapper">
                            <div class="cloud-fluffy"></div>
                        </div>
                        
                        <!-- 4. Simple: クロスフェード用の黒幕 -->
                        <div class="trans-piece simple-fade"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="info-footer">
            <div class="cam-info">
                <div class="location-group">
                    <span class="icon">📍</span>
                    <div class="text-group">
                        <div class="country" id="infoCountry">Loading...</div>
                        <div class="location" id="infoLocation">Please wait</div>
                    </div>
                </div>
                <div class="time-group">
                    <span class="icon">🕒</span>
                    <div class="local-time">
                        <span class="label">Local Time</span>
                        <span class="time" id="infoTime">--:--:--</span>
                    </div>
                </div>
            </div>
            
            <button id="nextBtn" class="next-btn" aria-label="Next Camera" disabled>
                <div class="btn-content">
                    <span class="en">Next Camera</span>
                    <span class="ja">次のカメラ</span>
                </div>
                <span class="btn-icon">⏭</span>
            </button>
        </footer>

    </div>

    <!-- メインスクリプト -->
    <script src="script.js"></script>
</body>
</html>
