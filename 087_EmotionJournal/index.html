<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- アプリのタイトル -->
    <title>Emotion Journal | 感情日記</title>
    <!-- 生成したファビコン画像を読み込む -->
    <link rel="icon" href="favicon.png">
    <!-- CSSファイルを読み込む -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts から丸みのある優しいフォントを読み込む -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- アプリのヘッダー -->
        <header>
            <h1>Emotion Journal</h1>
            <p>今の気持ちを記録しよう / Record your feelings</p>
        </header>

        <!-- 感情を入力するセクション -->
        <section class="input-section">
            <div class="emotion-selector">
                <p class="section-label">今の気分は？ / How are you feeling?</p>
                <div class="emojis">
                    <!-- 各感情のボタン（data-emotion属性で感情の種類を管理） -->
                    <button class="emoji-btn" data-emotion="happy" title="嬉しい / Happy">
                        <span class="emoji-icon">😄</span><br><span>Happy</span>
                    </button>
                    <button class="emoji-btn" data-emotion="calm" title="穏やか / Calm">
                        <span class="emoji-icon">😌</span><br><span>Calm</span>
                    </button>
                    <button class="emoji-btn" data-emotion="sad" title="悲しい / Sad">
                        <span class="emoji-icon">😢</span><br><span>Sad</span>
                    </button>
                    <button class="emoji-btn" data-emotion="angry" title="怒り / Angry">
                        <span class="emoji-icon">😡</span><br><span>Angry</span>
                    </button>
                    <button class="emoji-btn" data-emotion="tired" title="疲れた / Tired">
                        <span class="emoji-icon">😫</span><br><span>Tired</span>
                    </button>
                </div>
            </div>

            <!-- 理由や詳細を書くテキストエリア -->
            <div class="text-input">
                <textarea id="journal-text" placeholder="なぜそう感じたの？自由に書いてみよう / Why do you feel this way? Write freely..." rows="4"></textarea>
            </div>

            <!-- 保存ボタン -->
            <button id="save-btn" class="save-btn">記録する / Save</button>
        </section>

        <!-- 過去の記録を表示するセクション -->
        <section class="timeline-section">
            <div class="timeline-header">
                <h2>過去の記録 / Past Records</h2>
                
                <!-- 感情ごとの絞り込み機能 -->
                <div class="filter-container">
                    <label for="emotion-filter">絞り込み / Filter:</label>
                    <select id="emotion-filter">
                        <option value="all">すべて / All</option>
                        <option value="happy">😄 Happy</option>
                        <option value="calm">😌 Calm</option>
                        <option value="sad">😢 Sad</option>
                        <option value="angry">😡 Angry</option>
                        <option value="tired">😫 Tired</option>
                    </select>
                </div>
            </div>

            <!-- 全件削除ボタン -->
            <button id="delete-all-btn" class="delete-all-btn">全件削除 / Delete All</button>

            <!-- 記録リストが追加される場所 -->
            <div id="journal-list" class="journal-list">
                <!-- JavaScriptでここに記録が追加されます -->
            </div>
        </section>
    </div>
    
    <!-- JavaScriptファイルを読み込む -->
    <script src="script.js"></script>
</body>
</html>
