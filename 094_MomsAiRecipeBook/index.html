<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's AI Recipe Book | お母さんのAIレシピ帳</title>
    <!-- ファビコン (目玉焼きフライパン) -->
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1>Mom's AI Recipe Book <br><span class="subtitle">お母さんのAIレシピ帳</span></h1>
            <div class="data-actions">
                <button id="export-btn" class="btn btn-outline btn-fixed">エクスポート (Export)</button>
                <label class="btn btn-outline btn-fixed label-btn">
                    <span>インポート (Import)</span>
                    <input type="file" id="import-file" accept=".json" style="display: none;">
                </label>
            </div>
        </div>
        
        <!-- タブナビゲーション (SPA化) -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-target="view-list">レシピ一覧<br>(List)</button>
            <button class="tab-btn" data-target="view-add">レシピを追加<br>(Add Recipe)</button>
        </nav>
    </header>

    <main class="container">
        <!-- レシピ一覧タブ -->
        <section id="view-list" class="view-section active">
            <div class="list-controls">
                <input type="text" id="search-keyword" placeholder="キーワード検索 (Search...)">
                <select id="filter-genre">
                    <option value="all">すべてのジャンル (All)</option>
                    <option value="和食">和食 (Japanese)</option>
                    <option value="洋食">洋食 (Western)</option>
                    <option value="中華">中華 (Chinese)</option>
                    <option value="デザート">デザート (Dessert)</option>
                    <option value="その他">その他 (Other)</option>
                </select>
                <select id="sort-order">
                    <option value="newest">新着順 (Newest)</option>
                    <option value="count">作った回数順 (Most Cooked)</option>
                    <option value="rating">星評価順 (Highest Rating)</option>
                </select>
            </div>

            <div id="recipe-grid" class="recipe-grid">
                <!-- レシピカードが動的に追加されます -->
            </div>
        </section>

        <!-- レシピ追加・編集タブ -->
        <section id="view-add" class="view-section hidden">
            <!-- AIレシピ流し込み用エリア -->
            <div class="card-box ai-import-box">
                <h2>AIレシピ解析 (AI Parse)</h2>
                <p class="help-text">AIの出力を貼り付けて「自動入力」を押してください。</p>
                <textarea id="ai-text" rows="3" placeholder="AIのレシピ文章をここにペースト..."></textarea>
                <button id="auto-fill-btn" class="btn btn-primary btn-sm">自動入力 (Auto Fill)</button>
            </div>

            <!-- レシピ入力フォーム -->
            <div class="card-box form-box">
                <h2 id="form-title">手動入力・編集 (Manual Input)</h2>
                <form id="recipe-form">
                    <div class="form-group">
                        <label>タイトル (Title):</label>
                        <input type="text" id="recipe-title" required placeholder="例: ふわふわオムライス">
                    </div>
                    
                    <div class="form-group">
                        <label>ジャンル (Genre):</label>
                        <select id="recipe-genre">
                            <option value="和食">和食 (Japanese)</option>
                            <option value="洋食">洋食 (Western)</option>
                            <option value="中華">中華 (Chinese)</option>
                            <option value="デザート">デザート (Dessert)</option>
                            <option value="その他">その他 (Other)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>材料 (Ingredients):</label>
                        <textarea id="recipe-ingredients" rows="3" required placeholder="例: 卵 2個、玉ねぎ 半分..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>作り方 (Steps):</label>
                        <textarea id="recipe-steps" rows="5" required placeholder="1. 玉ねぎを切る..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>写真 (Photo):</label>
                        <input type="file" id="recipe-photo" accept="image/*">
                        <img id="photo-preview" class="photo-preview hidden" alt="プレビュー">
                    </div>

                    <div class="form-group">
                        <label>星評価 (Rating):</label>
                        <select id="recipe-rating">
                            <option value="5">★★★★★ (5)</option>
                            <option value="4">★★★★☆ (4)</option>
                            <option value="3" selected>★★★☆☆ (3)</option>
                            <option value="2">★★☆☆☆ (2)</option>
                            <option value="1">★☆☆☆☆ (1)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>家族のコメント (Family's Comments):</label>
                        <input type="text" id="recipe-comments" placeholder="例: おいしかった！また作って！">
                    </div>

                    <input type="hidden" id="edit-id" value="">
                    <button type="submit" id="save-btn" class="btn btn-primary btn-large">保存 (Save)</button>
                    <button type="button" id="cancel-edit-btn" class="btn btn-outline hidden" style="margin-top:10px; width:100%;">キャンセル (Cancel)</button>
                </form>
            </div>
        </section>
    </main>

    <!-- レシピ詳細モーダル -->
    <div id="detail-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="modal-close" class="modal-close">&times;</button>
            <div id="modal-body" class="modal-body">
                <!-- JSでコンテンツ生成 -->
            </div>
            
            <div class="modal-history-section">
                <h3>作った記録に残す (Add Cook History)</h3>
                <div class="history-form">
                    <input type="date" id="history-date">
                    <input type="file" id="history-photo" accept="image/*">
                    <button id="add-history-btn" class="btn btn-primary btn-sm">＋作った！ (Cooked!)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 画像圧縮用の非表示キャンバス -->
    <canvas id="image-canvas" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
