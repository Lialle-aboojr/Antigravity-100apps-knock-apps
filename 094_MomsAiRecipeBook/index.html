<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's AI Recipe Book | お母さんのAIレシピ帳</title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 id="app-title">Mom's AI Recipe Book</h1>
            <div class="subtitle">お母さんのAIレシピ帳</div>
        </div>
    </header>

    <main class="container">
        <!-- レシピ一覧画面 (メイン) -->
        <section id="view-list" class="view-section active">
            <div class="list-controls">
                <input type="text" id="search-keyword" placeholder="キーワード検索 (Search...)">
                <select id="filter-genre">
                    <option value="all">すべてのジャンル (All)</option>
                    <option value="和食">和食 (Japanese)</option>
                    <option value="洋食">洋食 (Western)</option>
                    <option value="中華">中華 (Chinese)</option>
                    <option value="デザート">デザート (Dessert)</option>
                    <option value="その他">その他 (Other)</option>
                </select>
                <select id="sort-order">
                    <option value="newest">新着順 (Newest)</option>
                    <option value="count">作った回数順 (Most Cooked)</option>
                    <option value="rating">星評価順 (Highest Rating)</option>
                </select>
            </div>

            <div id="recipe-grid" class="recipe-grid">
                <!-- レシピカードが動的に追加されます -->
            </div>
            
            <button id="fab-add" class="fab">+</button>
        </section>

        <!-- レシピ追加・編集画面 -->
        <section id="view-add" class="view-section hidden">
            <button id="back-to-list-btn" class="btn btn-outline back-btn">← 戻る (Back)</button>

            <!-- AIレシピ流し込み用エリア -->
            <div class="card-box ai-import-box">
                <h2>AIレシピ解析 (AI Parse)</h2>
                <p class="help-text">AIの出力を貼り付けて「自動入力」を押してください。</p>
                <textarea id="ai-text" rows="3" placeholder="AIのレシピ文章をここにペースト..."></textarea>
                <button id="auto-fill-btn" class="btn btn-primary btn-sm">自動入力 (Auto Fill)</button>
            </div>

            <!-- レシピ入力フォーム -->
            <div class="card-box form-box">
                <h2 id="form-title">手動入力・編集 (Manual Input)</h2>
                <form id="recipe-form">
                    <div class="form-group">
                        <label>タイトル (Title):</label>
                        <input type="text" id="recipe-title" required placeholder="例: ふわふわオムライス">
                    </div>
                    
                    <div class="form-group">
                        <label>ジャンル (Genre):</label>
                        <select id="recipe-genre">
                            <option value="和食">和食 (Japanese)</option>
                            <option value="洋食">洋食 (Western)</option>
                            <option value="中華">中華 (Chinese)</option>
                            <option value="デザート">デザート (Dessert)</option>
                            <option value="その他">その他 (Other)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>材料 (Ingredients):</label>
                        <textarea id="recipe-ingredients" rows="3" required placeholder="例: 卵 2個、玉ねぎ 半分..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>作り方 (Steps):</label>
                        <textarea id="recipe-steps" rows="5" required placeholder="1. 玉ねぎを切る..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>写真 (Photo):</label>
                        <div class="file-upload-wrapper">
                            <label for="recipe-photo" class="btn btn-secondary file-btn sync-height">📸 写真を選ぶ</label>
                            <span id="recipe-photo-name" class="file-name">未選択 (No file)</span>
                            <input type="file" id="recipe-photo" accept="image/*" class="hidden-file">
                        </div>
                        <img id="photo-preview" class="photo-preview hidden" style="margin-top:10px;max-width:100%;border-radius:8px;" alt="プレビュー">
                    </div>

                    <div class="form-group">
                        <label>星評価 (Rating):</label>
                        <select id="recipe-rating">
                            <option value="5">★★★★★ (5)</option>
                            <option value="4">★★★★☆ (4)</option>
                            <option value="3" selected>★★★☆☆ (3)</option>
                            <option value="2">★★☆☆☆ (2)</option>
                            <option value="1">★☆☆☆☆ (1)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>家族のコメント (Family's Comments):</label>
                        <input type="text" id="recipe-comments" placeholder="例: おいしかった！また作って！">
                    </div>

                    <input type="hidden" id="edit-id" value="">
                    <button type="submit" id="save-btn" class="btn btn-primary btn-large" style="margin-top: 15px;">保存 (Save)</button>
                </form>
            </div>

            <!-- エクスポート/インポート -->
            <div class="data-actions-bottom card-box">
                <p class="help-text" style="margin-bottom: 10px;">データの引き継ぎ・バックアップはこちら (Backup Data)</p>
                <div class="data-actions-flex">
                    <button id="export-btn" class="btn btn-outline">エクスポート (Export)</button>
                    <label class="btn btn-outline label-btn" style="display:inline-flex; align-items:center; justify-content:center;">
                        <span>インポート (Import)</span>
                        <input type="file" id="import-file" accept=".json" class="hidden-file">
                    </label>
                </div>
            </div>
        </section>
    </main>

    <!-- レシピ詳細モーダル -->
    <div id="detail-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="modal-close" class="modal-close">&times;</button>
            <div id="modal-body" class="modal-body">
                <!-- JSでコンテンツ生成 -->
            </div>
            
            <div class="modal-history-section">
                <h3>作った記録に残す (Add Cook History)</h3>
                
                <div class="history-form-container">
                    <div class="history-inputs-row">
                        <input type="date" id="history-date" class="sync-height">
                        
                        <div class="history-file-wrapper">
                            <label for="history-photo" class="btn btn-secondary file-btn sync-height">📸 写真を選ぶ</label>
                            <input type="file" id="history-photo" accept="image/*" class="hidden-file">
                        </div>
                        
                        <span id="history-photo-name" class="file-name">未選択 (None)</span>
                    </div>
                    
                    <div class="history-submit-row">
                        <button id="add-history-btn" class="btn btn-primary btn-large history-add-btn">＋作った！ (Cooked!)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 画像圧縮用の非表示キャンバス -->
    <canvas id="image-canvas" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
