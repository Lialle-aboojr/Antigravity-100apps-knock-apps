<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Pricing Table - 可変料金テーブル</title>
    <!-- ファビコンの読み込み: 生成された画像、またはフォールバックの絵文字 -->
    <link rel="icon" href="favicon.png" type="image/png" onerror="this.onerror=null; this.href='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>'">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pricing-wrapper">
        <header class="pricing-header">
            <h1 class="pricing-title">シンプルな料金プラン<br><span class="en-text">Simple Pricing Plans</span></h1>
            <p class="pricing-subtitle">あなたに最適なプランを選んでください<br><span class="en-text">Choose the perfect plan for you</span></p>
        </header>

        <div class="toggle-container">
            <span class="toggle-label">月額 <span class="en-text">Monthly</span></span>
            <label class="switch">
                <input type="checkbox" id="billing-toggle">
                <span class="slider round"></span>
            </label>
            <span class="toggle-label">年額 <span class="en-text">Annually</span> <span class="badge-save">20% お得 / Save 20%</span></span>
        </div>

        <div class="pricing-cards-container" id="pricing-cards-container">
            <!-- JavaScriptで動的にカードが生成されます / Cards will be dynamically generated by JavaScript -->
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
