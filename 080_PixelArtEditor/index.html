<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelArtEditor - ドット絵エディター</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    
    <!-- ツールバー（操作パネル） -->
    <aside class="toolbar">
      <h1 class="app-title">PixelArt<br>Editor</h1>

      <!-- ペンの色設定 -->
      <div class="tool-group">
        <label for="color-picker" class="tool-label">ペンの色 / Pen Color</label>
        <input type="color" id="color-picker" value="#ff3b3b" class="color-swatch" title="色を選択">
      </div>

      <!-- モード切り替え（描く、消す、塗りつぶす） -->
      <div class="tool-group flex-group">
        <button id="btn-draw" class="btn active" title="描画モード">
          <span class="icon">✏️</span>
          <span class="btn-text">描く<br>Draw</span>
        </button>
        <button id="btn-fill" class="btn" title="塗りつぶしモード">
          <span class="icon">🪣</span>
          <span class="btn-text">塗る<br>Fill</span>
        </button>
        <button id="btn-eraser" class="btn" title="消しゴムモード">
          <span class="icon">🧹</span>
          <span class="btn-text">消す<br>Erase</span>
        </button>
      </div>

      <hr class="divider">

      <!-- 背景色の設定 -->
      <div class="tool-group">
        <label class="tool-label">背景色 / Background</label>
        <div class="bg-options">
          <label class="checkbox-label">
            <input type="checkbox" id="chk-transparent" checked>
            透過 (Transparent)
          </label>
          <div class="custom-bg-group" id="custom-bg-group" style="display: none;">
            <input type="color" id="bg-color-picker" value="#ffffff" class="color-swatch-small">
            <span class="small-text">単色を指定</span>
          </div>
        </div>
      </div>

      <hr class="divider">

      <!-- サイズとファイルのインポート -->
      <div class="tool-group">
        <label for="size-selector" class="tool-label">サイズ / Canvas Size</label>
        <select id="size-selector" class="dropdown">
          <option value="16">16 x 16</option>
          <option value="32" selected>32 x 32</option>
          <option value="64">64 x 64</option>
        </select>
        <p class="warning-text">※ サイズ変更は初期化されます</p>
      </div>

      <div class="tool-group">
        <label class="tool-label">画像読み込み / Import</label>
        <label class="file-upload-btn btn outline">
          <span class="icon">🖼️</span>
          <span class="btn-text">画像を開く<br>Open</span>
          <input type="file" id="file-import" accept="image/png, image/jpeg" style="display: none;">
        </label>
        <p class="warning-text">※ 現在のサイズでドット化されます</p>
      </div>

      <hr class="divider">

      <!-- 全般操作 -->
      <div class="tool-group flex-group">
        <button id="btn-undo" class="btn outline" title="直前の操作を取り消す">
          <span class="icon">↩️</span>
          <span class="btn-text">戻る<br>Undo</span>
        </button>
        <button id="btn-clear" class="btn danger outline" title="すべて消去する">
          <span class="icon">🗑️</span>
          <span class="btn-text">全消去<br>Clear</span>
        </button>
      </div>

      <div class="tool-group">
        <button id="btn-grid-toggle" class="btn outline" title="グリッド線の表示可否">
          <span class="icon">🔲</span>
          <span class="btn-text grid-btn-text">枠線 / Grid: ON</span>
        </button>
      </div>

      <!-- 最下部に押しやるための余白 -->
      <div class="spacer"></div>

      <div class="tool-group">
        <button id="btn-download" class="btn primary" title="PNG画像として保存">
          <span class="icon">💾</span>
          <span class="btn-text">保存 / Save PNG</span>
        </button>
      </div>
    </aside>

    <!-- キャンバスエリア -->
    <main class="canvas-area">
      <div class="canvas-wrapper">
        <canvas id="pixel-canvas"></canvas>
      </div>
    </main>
    
  </div>

  <script src="script.js"></script>
</body>
</html>
